<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PhishGuardian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter;background:#0b1220;color:#e5e7eb}
.container{max-width:1000px;margin:auto;padding:24px}
.card{background:#0f172a;border-radius:14px;padding:18px;margin-top:20px}
.input{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff}
.btn{padding:12px 16px;border-radius:10px;border:none;font-weight:600;cursor:pointer}
.btn-primary{background:#22d3ee;color:#071427}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
.safe{background:#14532d;color:#22c55e}
.suspicious{background:#78350f;color:#f59e0b}
.danger{background:#7f1d1d;color:#f43f5e}
.muted{color:#94a3b8}
</style>
</head>

<body>
<div class="container">
  <h1>PhishGuardian 🛡️</h1>
  <p class="muted">Client-side phishing detection with live backend validation</p>

  <div class="card">
    <form id="scanForm">
      <input id="urlInput" class="input" placeholder="Paste a URL to scan"/>
      <br><br>
      <button class="btn btn-primary">Scan</button>
    </form>

    <div id="result" style="display:none;margin-top:16px">
      <span id="verdictBadge" class="badge"></span>
      <span class="muted"> Score: <span id="scoreVal"></span></span>
      <p class="muted" id="normalizedLine"></p>
      <div id="reasonsWrap"></div>
    </div>
  </div>
</div>

<script>
/* ================= BACKEND ================= */
const BACKEND_URL =
  location.hostname === "localhost"
    ? "http://127.0.0.1:5000"
    : "https://phishguardian-backend.onrender.com";

async function analyzeWithBackend(url){
  try{
    const r = await fetch(`${BACKEND_URL}/analyze`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({url})
    });
    return await r.json();
  }catch{return null}
}

/* ================= HEURISTICS ================= */

/* 🔴 EXPANDED BRANDS */
// -------- Expanded brand impersonation patterns --------

const BRAND_MISSPELLS = {

  "sbi-secure": "sbi",

  "axis-secure": "axisbank",
  "kotak-login": "kotakbank",

  "metamask-login": "metamask",
  "metamask-secure": "metamask",

  "phantom-wallet": "phantom",

  /* ===== SaaS / Cloud / Dev ===== */
  "github-login": "github",

  "gpay-login": "googlepay"
};


/* 🟢 EXPANDED WHITELIST */
// -------- Trusted base domains (expanded, conservative) --------

const WHITELIST_BASES = [
  /* ===== Global Banks ===== */
  "chase.com",
  "citi.com",
  "citibank.com",
  "hsbc.com",
  "barclays.co.uk",
  "bankofamerica.com",
  "wellsfargo.com",
  "deutsche-bank.com",

  /* ===== Indian Banks ===== */
  "hdfcbank.com",
  "icicibank.com",
  "sbi.co.in",
  "axisbank.com",
  "kotak.com",
  "pnbindia.in",
  "yesbank.in",
  "bankofbaroda.in",
  "unionbankofindia.co.in",

  /* ===== Crypto ===== */
  "binance.com",
  "coinbase.com",
  "kraken.com",
  "bitfinex.com",
  "bybit.com",
  "okx.com",
  "kucoin.com",
  "metamask.io",

  "phantom.app",

  /* ===== SaaS / Cloud ===== */
  "github.com",

  "bitbucket.org",
  "aws.amazon.com",
  "azure.microsoft.com",
  "cloud.google.com",
  "slack.com",
  "notion.so",
  "zoom.us",
  "dropbox.com",
  "atlassian.com",

  /* ===== Payments ===== */
  "paypal.com",
  "stripe.com",
  "wise.com",
  "revolut.com",
  "paytm.com",
  "phonepe.com",
  "googlepay.com"
];


/* Other rules */
const SUSPICIOUS_TLDS = [".ru",".cn",".tk",".xyz",".top",".site",".click",".support"];
const PHISHY_KEYWORDS = [
  "login","verify","secure","account","reset","password",
  "bank","payment","billing","refund","wallet",
  "urgent","alert","suspended","action",
  "bonus","reward","free","claim",
  "support","official"
];

/* ================= LOGIC ================= */
function normalizeUrl(u){if(!/^https?:\/\//i.test(u))u="http://"+u;return u}
function hostOf(u){try{return new URL(u).hostname.toLowerCase()}catch{return""}}
function isUnder(h,b){return h===b||h.endsWith("."+b)}

function analyzeUrlBasic(input){
  const url=normalizeUrl(input),host=hostOf(url),lower=url.toLowerCase();
  let score=0,flags=[];

  for(const b of WHITELIST_BASES)
    if(isUnder(host,b))
      return{url,host,score:0,flags:[],verdict:"Safe",badge:"safe"};

  if(/\d+\.\d+\.\d+\.\d+/.test(host)){flags.push("Raw IP address");score+=2}
  for(const t of SUSPICIOUS_TLDS)
    if(host.endsWith(t)){flags.push("Suspicious TLD");score+=2}

  const hits=PHISHY_KEYWORDS.filter(k=>lower.includes(k));
  if(hits.length){flags.push("Phishing keywords detected");score+=1}
  if(hits.length>=3){flags.push("Multiple phishing keywords");score+=2}

  for(const b in BRAND_MISSPELLS)
    if(lower.includes(b)){flags.push("Brand impersonation");score+=2}

  let verdict="Safe",badge="safe";
  if(score>=5){verdict="Dangerous";badge="danger"}
  else if(score>=2){verdict="Suspicious";badge="suspicious"}

  return{url,host,score,flags,verdict,badge};
}

/* ================= UI ================= */
scanForm.addEventListener("submit",async e=>{
  e.preventDefault();
  const val=urlInput.value.trim(); if(!val)return;

  const r=analyzeUrlBasic(val);
  const b=await analyzeWithBackend(val);

  verdictBadge.textContent=r.verdict;
  verdictBadge.className="badge "+r.badge;
  scoreVal.textContent=r.score;
  normalizedLine.textContent=`URL: ${r.url} • Host: ${r.host}`;

  const ul=document.createElement("ul");
  r.flags.forEach(f=>{const li=document.createElement("li");li.textContent=f;ul.appendChild(li)});
  if(!r.flags.length) ul.innerHTML="<li class='muted'>No obvious red flags</li>";
  if(b) ul.innerHTML+="<li class='muted'>Live backend validation active</li>";

  reasonsWrap.innerHTML="";
  reasonsWrap.appendChild(ul);
  result.style.display="block";
});
</script>
</body>
</html>
